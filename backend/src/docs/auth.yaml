tags:
  - name: Auth
    description: Autentikasi pengguna

paths:
/users/register:
    post:
      tags: [Auth]
      summary: Register user baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, confPassword, jenis_kelamin]
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: password123
                confPassword:
                  type: string
                  example: password123
                jenis_kelamin:
                  type: string
                  enum: [laki-laki, perempuan]
                  example: laki-laki
                role:
                  type: string
                  enum: [admin, user]
                  example: user
      responses:
        "201":
          description: Register berhasil
        "400":
          description: Data tidak valid
  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: password123
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "401":
          description: Email atau password salah
