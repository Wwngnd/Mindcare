tags:
  - name: Profile
    description: Manajemen profil user yang sedang login

paths:
  /auth/me:
    get:
      tags: [Profile]
      summary: Ambil profil user yang sedang login
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Berhasil mengambil data profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
                  jenis_kelamin:
                    type: string
                  role:
                    type: string
        "401":
          description: Unauthorized

  /users/me:
    put:
      tags: [Profile]
      summary: Update profil user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe Updated
                email:
                  type: string
                  example: john_updated@example.com
                jenis_kelamin:
                  type: string
                  enum: [laki-laki, perempuan]
                  example: laki-laki
      responses:
        "200":
          description: Berhasil diupdate
        "400":
          description: Data tidak valid
        "401":
          description: Unauthorized

    delete:
      tags: [Profile]
      summary: Hapus akun sendiri
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Akun berhasil dihapus
        "401":
          description: Unauthorized
